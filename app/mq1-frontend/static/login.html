<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — VetClínica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde-escuro: #1a6b4a;
      --verde-medio:  #2d9e6e;
      --verde-claro:  #4cbb8e;
      --verde-suave:  #e8f7f0;
      --branco:       #ffffff;
      --cinza-100:    #f8f9fa;
      --cinza-300:    #dde1e7;
      --cinza-500:    #8a9099;
      --cinza-700:    #3d4450;
      --cinza-800:    #252b35;
      --vermelho:     #e05555;
      --font-display: 'Outfit', sans-serif;
      --font-body:    'Nunito', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: #0f3d28;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Fundo decorativo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(76,187,142,.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 20%, rgba(45,158,110,.15) 0%, transparent 60%),
        linear-gradient(135deg, #0d2e1e 0%, #1a5c38 50%, #0d2e1e 100%);
      z-index: 0;
    }

    /* Padrão de patas decorativo */
    body::after {
      content: '🐾';
      position: fixed;
      font-size: 300px;
      opacity: .03;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-15deg);
      z-index: 0;
      pointer-events: none;
    }

    .login-container {
      position: relative;
      z-index: 1;
      display: flex;
      width: 100%;
      max-width: 920px;
      min-height: 540px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,.45);
    }

    /* Painel esquerdo — branding */
    .login-brand {
      flex: 1;
      background: linear-gradient(160deg, var(--verde-escuro) 0%, var(--verde-medio) 100%);
      padding: 52px 44px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .login-brand::before {
      content: '';
      position: absolute;
      width: 320px; height: 320px;
      border-radius: 50%;
      border: 60px solid rgba(255,255,255,.06);
      bottom: -100px; right: -80px;
    }

    .login-brand::after {
      content: '';
      position: absolute;
      width: 200px; height: 200px;
      border-radius: 50%;
      border: 40px solid rgba(255,255,255,.06);
      top: -60px; left: -60px;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-logo-icon {
      width: 52px; height: 52px;
      background: rgba(255,255,255,.2);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      backdrop-filter: blur(8px);
    }

    .brand-logo-text h1 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 800;
      color: white;
    }

    .brand-logo-text span {
      font-size: .78rem;
      color: rgba(255,255,255,.65);
    }

    .brand-tagline {
      position: relative;
      z-index: 1;
    }

    .brand-tagline h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 800;
      color: white;
      line-height: 1.25;
      margin-bottom: 14px;
    }

    .brand-tagline p {
      color: rgba(255,255,255,.7);
      font-size: .9rem;
      line-height: 1.7;
    }

    .brand-stats {
      display: flex;
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .brand-stat {
      text-align: center;
    }

    .brand-stat .val {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      color: white;
    }

    .brand-stat .lbl {
      font-size: .72rem;
      color: rgba(255,255,255,.6);
    }

    /* Painel direito — formulário */
    .login-form-panel {
      background: white;
      width: 380px;
      flex-shrink: 0;
      padding: 52px 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-form-panel h2 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--cinza-800);
      margin-bottom: 6px;
    }

    .login-form-panel .subtitle {
      color: var(--cinza-500);
      font-size: .88rem;
      margin-bottom: 36px;
    }

    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: .82rem;
      font-weight: 700;
      color: var(--cinza-700);
      margin-bottom: 7px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
    }

    .form-control {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid var(--cinza-300);
      border-radius: 10px;
      font-size: .92rem;
      font-family: var(--font-body);
      color: var(--cinza-800);
      outline: none;
      transition: all .2s;
    }

    .form-control:focus {
      border-color: var(--verde-medio);
      box-shadow: 0 0 0 3px rgba(45,158,110,.12);
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--verde-medio);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover { background: var(--verde-escuro); transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: .7; cursor: not-allowed; transform: none; }

    .error-msg {
      background: #fef0f0;
      border: 1px solid #fcc;
      color: var(--vermelho);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .84rem;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .error-msg.show { display: flex; }

    .login-footer {
      margin-top: 28px;
      text-align: center;
      color: var(--cinza-500);
      font-size: .78rem;
    }

    /* Animação de entrada */
    .login-container {
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 680px) {
      .login-brand { display: none; }
      .login-form-panel { width: 100%; }
    }
  </style>
</head>
<body>

<div class="login-container">

  <!-- Painel esquerdo: Branding -->
  <div class="login-brand">
    <div class="brand-logo">
      <div class="brand-logo-icon">🐾</div>
      <div class="brand-logo-text">
        <h1>VetClínica</h1>
        <span>Sistema de Gestão</span>
      </div>
    </div>

    <div class="brand-tagline">
      <h2>Cuidando com amor e tecnologia</h2>
      <p>Gerencie pacientes, consultas e o histórico de saúde dos animais com facilidade e eficiência.</p>
    </div>

    <div class="brand-stats">
      <div class="brand-stat">
        <div class="val">🐶</div>
        <div class="lbl">Pacientes</div>
      </div>
      <div class="brand-stat">
        <div class="val">📋</div>
        <div class="lbl">Consultas</div>
      </div>
      <div class="brand-stat">
        <div class="val">💊</div>
        <div class="lbl">Tratamentos</div>
      </div>
    </div>
  </div>

  <!-- Painel direito: Formulário -->
  <div class="login-form-panel">
    <h2>Bem-vindo!</h2>
    <p class="subtitle">Faça login para acessar o sistema</p>

    <div class="error-msg" id="error-msg">
      <span>⚠</span>
      <span id="error-text">Usuário ou senha incorretos.</span>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="username">Usuário</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input
            type="text"
            id="username"
            class="form-control"
            placeholder="Digite seu usuário"
            autocomplete="username"
            required
          >
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Senha</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Digite sua senha"
            autocomplete="current-password"
            required
          >
        </div>
      </div>

      <button type="submit" class="btn-login" id="btn-login">
        <span id="btn-text">Entrar no Sistema</span>
        <span id="btn-icon">→</span>
      </button>
    </form>

    <div class="login-footer">
      VetClínica © 2026
    </div>
  </div>

</div>

<script>
  // Redireciona se já logado
  if (localStorage.getItem('vet_token')) {
    window.location.href = '/dashboard.html';
  }

  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btn-login');
    const errMsg   = document.getElementById('error-msg');
    const errText  = document.getElementById('error-text');
    const btnText  = document.getElementById('btn-text');
    const btnIcon  = document.getElementById('btn-icon');

    // Esconde erro anterior
    errMsg.classList.remove('show');
    btn.disabled = true;
    btnText.textContent = 'Entrando...';
    btnIcon.textContent = '⏳';

    try {
      const formData = new FormData();
      formData.append('username', username);
      formData.append('password', password);

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        body: formData
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || 'Credenciais inválidas');
      }

      localStorage.setItem('vet_token', data.access_token);
      localStorage.setItem('vet_user', data.username);

      btnText.textContent = 'Sucesso!';
      btnIcon.textContent = '✓';

      setTimeout(() => {
        window.location.href = '/dashboard.html';
      }, 500);

    } catch (err) {
      errText.textContent = err.message;
      errMsg.classList.add('show');
      btn.disabled = false;
      btnText.textContent = 'Entrar no Sistema';
      btnIcon.textContent = '→';
    }
  });
</script>
</body>
</html>
